name: PreviewMD
options:
  bundleIdPrefix: com.previewmd
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

schemes:
  PreviewMD:
    build:
      targets:
        PreviewMD: all
        PreviewMDQuickLook: all
        PreviewMDTests: [test]
    test:
      targets:
        - PreviewMDTests

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.4.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.1.0"

targets:
  PreviewMD:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "mermaid-source.txt"
    dependencies:
      - target: PreviewMDQuickLook
        embed: true
        codeSign: true
      - package: swift-markdown
        product: Markdown
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.previewmd.PreviewMD
        PRODUCT_NAME: PreviewMD
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/PreviewMD.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application: AZAT SHAMILEVICH GAYNUTDINOV (LY8G872X5U)"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: LY8G872X5U
        COMBINE_HIDPI_IMAGES: true

  PreviewMDQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: Extension
      - path: Shared
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "mermaid-source.txt"
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.previewmd.PreviewMD.QuickLook
        PRODUCT_NAME: PreviewMDQuickLook
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_FILE: Extension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extension/PreviewMDQuickLook.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application: AZAT SHAMILEVICH GAYNUTDINOV (LY8G872X5U)"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: LY8G872X5U
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

  PreviewMDTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Shared
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "mermaid-source.txt"
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.previewmd.PreviewMDTests
        GENERATE_INFOPLIST_FILE: "YES"
